services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gnm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-narratives}
      POSTGRES_USER: ${POSTGRES_USER:-narratives}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-narratives}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: gnm-airflow:local
    container_name: gnm_airflow
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://narratives:narratives@postgres:5432/narratives
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow/project
    ports:
      - "127.0.0.1:${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/project/src
      - ./data:/opt/airflow/project/data
    command: airflow standalone

  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    image: gnm-jupyter:local
    container_name: gnm_jupyter
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "127.0.0.1:${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''

volumes:
  postgres_data: